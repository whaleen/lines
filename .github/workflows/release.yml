name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm install

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --title "lines $TAG" --notes "" --repo whaleen/lines

      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: lines ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload .sig file
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          TAG: ${{ github.ref_name }}
        run: |
          SIG="src-tauri/target/universal-apple-darwin/release/bundle/macos/lines.app.tar.gz.sig"
          if [ -f "$SIG" ]; then
            gh release upload "$TAG" "$SIG" --clobber --repo whaleen/lines
          else
            echo "ERROR: .sig file not found at $SIG" && exit 1
          fi

      - name: Update latest.json in homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          SIG_CONTENT=$(cat "src-tauri/target/universal-apple-darwin/release/bundle/macos/lines.app.tar.gz.sig")
          RELEASE=$(gh api repos/whaleen/lines/releases/tags/$TAG)
          URL=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith("universal.app.tar.gz")) | .browser_download_url')
          PUB_DATE=$(echo "$RELEASE" | jq -r '.published_at')
          NOTES=$(echo "$RELEASE" | jq -r '.body // ""')

          git clone https://x-access-token:$GH_TOKEN@github.com/whaleen/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg notes "$NOTES" \
            --arg url "$URL" \
            --arg sig "$SIG_CONTENT" \
            '{
              version: $version,
              pub_date: $pub_date,
              notes: $notes,
              platforms: {
                "darwin-universal": {
                  url: $url,
                  signature: $sig
                }
              }
            }' > latest.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "update: lines $TAG"
          git push
