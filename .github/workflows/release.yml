name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: lines ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  update-manifest:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: whaleen/homebrew-tap
          token: ${{ secrets.GH_PAT }}

      - name: Wait for release assets
        run: sleep 15

      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"

          # Fetch release (published, so tag lookup works)
          RELEASE=$(gh api repos/whaleen/lines/releases/tags/$TAG)

          URL=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith("universal.app.tar.gz")) | .browser_download_url')
          SIG_URL=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith("universal.app.tar.gz.sig")) | .browser_download_url')
          SIG_CONTENT=$(curl -sL "$SIG_URL")
          PUB_DATE=$(echo "$RELEASE" | jq -r '.published_at')
          NOTES=$(echo "$RELEASE" | jq -r '.body // ""')

          # Build JSON safely via jq
          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg notes "$NOTES" \
            --arg url "$URL" \
            --arg sig "$SIG_CONTENT" \
            '{
              version: $version,
              pub_date: $pub_date,
              notes: $notes,
              platforms: {
                "darwin-universal": {
                  url: $url,
                  signature: $sig
                }
              }
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Commit and push latest.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "update: lines ${{ github.ref_name }}"
          git push
